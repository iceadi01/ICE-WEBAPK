name: Build ICE Admin v2.8.14 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools'

      - name: Pasang Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Extract source ZIP terbaru
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ice_v*_admin.zip' | sort -V | tail -n 1)
          test -n "$ZIP_FILE"
          echo "Memakai $ZIP_FILE"
          mkdir -p src
          unzip -q "$ZIP_FILE" -d src
          PROJECT_DIR=$(dirname "$(find src \( -name settings.gradle -o -name settings.gradle.kts \) | head -1)")
          test -n "$PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Ambil mesin tunnel non-root
        run: |
          DEST="$PROJECT_DIR/app/src/main/jni/hev-socks5-tunnel"
          rm -rf "$DEST"
          if ! git clone --depth 1 --branch 2.15.0 --recurse-submodules --shallow-submodules \
              https://github.com/heiher/hev-socks5-tunnel.git "$DEST"; then
            rm -rf "$DEST"
            git clone --depth 1 --recurse-submodules --shallow-submodules \
              https://github.com/heiher/hev-socks5-tunnel.git "$DEST"
          fi
          git -C "$DEST" submodule update --init --recursive --depth 1
          test -f "$DEST/Android.mk"

      - name: Build dan sign APK admin
        run: |
          cd "$PROJECT_DIR"
          chmod +x build_admin.sh
          ./build_admin.sh
          mkdir -p "$GITHUB_WORKSPACE/out"
          APK_FILE=$(find . -maxdepth 1 -type f -name 'ice_v*_admin.apk' | sort -V | tail -n 1)
          test -n "$APK_FILE"
          APK_NAME=$(basename "$APK_FILE")
          cp "$APK_FILE" "$GITHUB_WORKSPACE/out/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: out/${{ env.APK_NAME }}
          if-no-files-found: error
