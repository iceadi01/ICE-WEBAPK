name: Build ICE User v2.8.18 APK Wi-Fi Global

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Pasang Android SDK
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Extract source ZIP terbaru
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ice_v*_user.zip' | sort -V | tail -n 1)
          test -n "$ZIP_FILE"
          echo "Memakai $ZIP_FILE"
          rm -rf src
          mkdir -p src
          unzip -q "$ZIP_FILE" -d src
          PROJECT_DIR=$(dirname "$(find src \( -name settings.gradle -o -name settings.gradle.kts \) | head -1)")
          test -n "$PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Pastikan source tanpa VPN dan NDK
        run: |
          test ! -f "$PROJECT_DIR/app/src/main/java/com/mimar/iceinject/DualNetworkVpnService.java"
          test ! -d "$PROJECT_DIR/app/src/main/jni"
          ! grep -R "BIND_VPN_SERVICE" "$PROJECT_DIR/app/src/main/AndroidManifest.xml"

      - name: Build dan sign APK user
        run: |
          set +e
          cd "$PROJECT_DIR"
          chmod +x build_user.sh
          ./build_user.sh 2>&1 | tee "$GITHUB_WORKSPACE/build.log"
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$STATUS" -ne 0 ]; then
            echo "::group::RINGKASAN ERROR UTAMA"
            grep -nEi '(^|[[:space:]])(fatal[[:space:]]+)?error:|FAILED:|Execution failed for task|A problem occurred|cannot find symbol' "$GITHUB_WORKSPACE/build.log" | head -n 180 || true
            echo "::endgroup::"
            exit "$STATUS"
          fi
          mkdir -p "$GITHUB_WORKSPACE/out"
          APK_FILE=$(find . -maxdepth 1 -type f -name 'ice_v*_user.apk' | sort -V | tail -n 1)
          test -n "$APK_FILE"
          APK_NAME=$(basename "$APK_FILE")
          cp "$APK_FILE" "$GITHUB_WORKSPACE/out/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload log jika build gagal
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-user-v2818
          path: build.log
          if-no-files-found: warn

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: out/${{ env.APK_NAME }}
          if-no-files-found: error
