name: Build ICE Admin APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Extract source ZIP admin terbaru
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ice_v*_admin.zip' | sort -V | tail -n 1)
          test -n "$ZIP_FILE"
          echo "Memakai $ZIP_FILE"
          mkdir -p src
          unzip -q "$ZIP_FILE" -d src
          PROJECT_FILE=$(find src \( -name settings.gradle -o -name settings.gradle.kts \) | head -n 1)
          test -n "$PROJECT_FILE"
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Build dan sign APK admin
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          chmod +x build_admin.sh
          ./build_admin.sh
          mkdir -p "$GITHUB_WORKSPACE/out"
          cp ice_v286_admin.apk "$GITHUB_WORKSPACE/out/ice_v286_admin.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ice_v286_admin.apk
          path: out/ice_v286_admin.apk
          if-no-files-found: error
