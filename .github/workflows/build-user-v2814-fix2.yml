name: Build ICE User v2.8.14 APK Fix 2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Pasang SDK dan Android NDK
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Extract source ZIP terbaru
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ice_v*_user.zip' | sort -V | tail -n 1)
          test -n "$ZIP_FILE"
          echo "Memakai $ZIP_FILE"
          rm -rf src
          mkdir -p src
          unzip -q "$ZIP_FILE" -d src
          PROJECT_DIR=$(dirname "$(find src \( -name settings.gradle -o -name settings.gradle.kts \) | head -1)")
          test -n "$PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Ambil dan sesuaikan mesin tunnel non-root
        run: |
          DEST="$PROJECT_DIR/app/src/main/jni/hev-socks5-tunnel"
          rm -rf "$DEST"
          git clone --depth 1 --branch 2.15.0 --recurse-submodules --shallow-submodules \
            https://github.com/heiher/hev-socks5-tunnel.git "$DEST"
          git -C "$DEST" submodule update --init --recursive --depth 1
          test -f "$DEST/Android.mk"

          # NDK 27 memberi warning baru pada kode lwIP lama. Upstream mengaktifkan
          # -Werror, sehingga warning biasa berubah menjadi kegagalan build.
          python3 - "$DEST" <<'PY'
          from pathlib import Path
          import re, sys

          root = Path(sys.argv[1])
          names = {"Android.mk", "Application.mk", "build.mk", "Makefile"}
          changed = []
          for path in root.rglob("*"):
              if not path.is_file() or path.name not in names:
                  continue
              try:
                  old = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              new = re.sub(r"(?<!\\S)-Werror(?:=[^\\s\\\\]+)?", "", old)
              if new != old:
                  path.write_text(new, encoding="utf-8")
                  changed.append(str(path.relative_to(root)))
          print("File build yang disesuaikan:")
          print("\n".join(changed) if changed else "Tidak ada -Werror yang ditemukan")
          PY

          echo "Sisa flag -Werror (seharusnya kosong):"
          grep -RIn --include='Android.mk' --include='Application.mk' --include='build.mk' \
            --include='Makefile' -- '-Werror' "$DEST" || true

      - name: Build dan sign APK user
        run: |
          set +e
          cd "$PROJECT_DIR"
          chmod +x build_user.sh
          ./build_user.sh 2>&1 | tee "$GITHUB_WORKSPACE/build.log"
          STATUS=${PIPESTATUS[0]}
          set -e

          if [ "$STATUS" -ne 0 ]; then
            echo "::group::RINGKASAN ERROR UTAMA"
            grep -nEi \
              '(^|[[:space:]])(fatal[[:space:]]+)?error:|FAILED:|undefined reference|make: \*\*\*|Execution failed for task|A problem occurred' \
              "$GITHUB_WORKSPACE/build.log" | head -n 150 || true
            echo "::endgroup::"
            exit "$STATUS"
          fi

          mkdir -p "$GITHUB_WORKSPACE/out"
          APK_FILE=$(find . -maxdepth 1 -type f -name 'ice_v*_user.apk' | sort -V | tail -n 1)
          test -n "$APK_FILE"
          APK_NAME=$(basename "$APK_FILE")
          cp "$APK_FILE" "$GITHUB_WORKSPACE/out/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload log jika build gagal
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-user-v2814
          path: build.log
          if-no-files-found: warn

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: out/${{ env.APK_NAME }}
          if-no-files-found: error
