name: Build ICE Inject APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/ice_v273_user_debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ice_v273_user_debug_apk
          path: out/ice_v273_user_debug.apk
