name: Build APK Biasa

on:
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'Nama file ZIP di halaman utama repository'
        required: true
        default: 'ice_v286_user.zip'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repository
        uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Extract source ZIP
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE='${{ github.event.inputs.zip_file }}'
          test -f "$ZIP_FILE" || {
            echo "File tidak ditemukan: $ZIP_FILE"
            exit 1
          }

          rm -rf src out
          mkdir -p src out
          unzip -q "$ZIP_FILE" -d src

          PROJECT_FILE=$(find src \( -name settings.gradle -o -name settings.gradle.kts \) | head -n 1)
          test -n "$PROJECT_FILE" || {
            echo "settings.gradle/settings.gradle.kts tidak ditemukan di dalam ZIP."
            exit 1
          }

          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          BASE_NAME=$(basename "$ZIP_FILE" .zip)

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "OUTPUT_NAME=${BASE_NAME}_debug.apk" >> "$GITHUB_ENV"
          echo "Source: $ZIP_FILE"
          echo "Project: $PROJECT_DIR"

      - name: Build APK debug
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          gradle :app:assembleDebug --stacktrace

          APK_FILE=$(find app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)
          test -f "$APK_FILE" || {
            echo "APK debug tidak ditemukan."
            exit 1
          }

          cp "$APK_FILE" "$GITHUB_WORKSPACE/out/$OUTPUT_NAME"
          echo "Selesai: $OUTPUT_NAME"

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.OUTPUT_NAME }}
          path: out/${{ env.OUTPUT_NAME }}
          if-no-files-found: error
