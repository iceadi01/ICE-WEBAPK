name: Build Tools ICE APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify project files
        shell: bash
        run: |
          echo "Isi repository:"
          find . -maxdepth 3 -type f | sort
          test -f settings.gradle || { echo "ERROR: settings.gradle tidak ada di root repository"; exit 1; }
          test -f build.gradle || { echo "ERROR: build.gradle tidak ada di root repository"; exit 1; }
          test -f app/build.gradle || { echo "ERROR: app/build.gradle tidak ada"; exit 1; }

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace :app:assembleDebug 2>&1 | tee build.log

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p hasil-apk
          cp app/build/outputs/apk/debug/app-debug.apk hasil-apk/Tools-ICE-v2.3-user-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tools-ICE-v2.3-user-APK
          path: hasil-apk/Tools-ICE-v2.3-user-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Tools-ICE-build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
