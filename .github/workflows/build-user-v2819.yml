name: Build ICE User v2.8.19 APK VPN Engine 2.15 + Crash Diagnostic

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Pasang SDK dan Android NDK
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Extract source ZIP terbaru
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f -name 'ice_v*_user.zip' | sort -V | tail -n 1)
          test -n "$ZIP_FILE"
          echo "Memakai $ZIP_FILE"
          rm -rf src
          mkdir -p src
          unzip -q "$ZIP_FILE" -d src
          PROJECT_DIR=$(dirname "$(find src \( -name settings.gradle -o -name settings.gradle.kts \) | head -1)")
          test -n "$PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Ambil HevSocks5Tunnel 2.15.0 resmi
        run: |
          DEST="$PROJECT_DIR/app/src/main/jni/hev-socks5-tunnel"
          rm -rf "$DEST"
          git clone --depth 1 --branch 2.15.0 --recurse-submodules --shallow-submodules \
            https://github.com/heiher/hev-socks5-tunnel.git "$DEST"
          test -f "$DEST/Android.mk"
          echo "Hev commit: $(git -C "$DEST" rev-parse --short HEAD)"

      - name: Perbaiki konfigurasi JNI
        run: |
          JNI_DIR="$PROJECT_DIR/app/src/main/jni"
          test -f "$JNI_DIR/ice_dual_jni.c"
          cat > "$JNI_DIR/Android.mk" <<'MK'
          ICE_APP_JNI_PATH := $(call my-dir)
          ICE_HEV_PATH := $(ICE_APP_JNI_PATH)/hev-socks5-tunnel
          include $(ICE_HEV_PATH)/Android.mk
          LOCAL_PATH := $(ICE_APP_JNI_PATH)
          include $(CLEAR_VARS)
          LOCAL_MODULE := ice-dual-jni
          LOCAL_SRC_FILES := ice_dual_jni.c
          LOCAL_C_INCLUDES := $(ICE_HEV_PATH)/src
          LOCAL_SHARED_LIBRARIES := hev-socks5-tunnel
          LOCAL_LDLIBS := -llog
          LOCAL_LDFLAGS += -Wl,-z,max-page-size=16384
          LOCAL_LDFLAGS += -Wl,-z,common-page-size=16384
          include $(BUILD_SHARED_LIBRARY)
          MK
          cat > "$JNI_DIR/Application.mk" <<'MK'
          APP_OPTIM := release
          APP_PLATFORM := android-29
          APP_ABI := armeabi-v7a arm64-v8a
          APP_CFLAGS := -O3
          APP_SUPPORT_FLEXIBLE_PAGE_SIZES := true
          NDK_TOOLCHAIN_VERSION := clang
          MK
          test -f "$JNI_DIR/ice_dual_jni.c"

      - name: Build dan sign APK user
        run: |
          set +e
          cd "$PROJECT_DIR"
          chmod +x build_user.sh
          ./build_user.sh 2>&1 | tee "$GITHUB_WORKSPACE/build.log"
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$STATUS" -ne 0 ]; then
            echo "::group::RINGKASAN ERROR UTAMA"
            grep -nEi 'No rule to make target|(^|[[:space:]])(fatal[[:space:]]+)?error:|FAILED:|undefined reference|make: \*\*\*|Execution failed for task|A problem occurred' "$GITHUB_WORKSPACE/build.log" | head -n 180 || true
            echo "::endgroup::"
            exit "$STATUS"
          fi
          mkdir -p "$GITHUB_WORKSPACE/out"
          APK_FILE=$(find . -maxdepth 1 -type f -name 'ice_v*_user.apk' | sort -V | tail -n 1)
          test -n "$APK_FILE"
          APK_NAME=$(basename "$APK_FILE")
          cp "$APK_FILE" "$GITHUB_WORKSPACE/out/$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload log jika build gagal
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-user-v2819
          path: build.log
          if-no-files-found: warn

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: out/${{ env.APK_NAME }}
          if-no-files-found: error
